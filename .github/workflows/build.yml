name: Build APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install Android SDK (official commandlinetools)
        run: |
          set -x
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          for i in 1 2 3; do
            if curl -fsSL --retry 3 https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdtools.zip; then
              break
            fi
            echo "download attempt $i failed, retrying in 5s..."
            sleep 5
          done
          ls -l cmdtools.zip
          unzip -q cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          rm -f cmdtools.zip
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        run: |
          sed -i 's/\r$//' ./gradlew || true
          chmod +x ./gradlew
          ls -la ./gradlew
          file ./gradlew

      - name: Build unsigned release APK
        run: |
          set -x
          bash ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Generate signing keystore (CI-only)
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias tvapp -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI, OU=TVApp, O=CI, L=CI, S=CI, C=CN"

      - name: Sign APK with apksigner
        run: |
          set -x
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          ls -la "$APKSIGNER" || echo "apksigner missing!"
          "$APKSIGNER" sign \
            --ks release.keystore \
            --ks-key-alias tvapp \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Diagnose on failure
        if: failure()
        run: |
          echo "== PATH =="; echo "$PATH"
          echo "== ANDROID_HOME =="; echo "$ANDROID_HOME"
          echo "== java =="; which java; java -version 2>&1 || true
          echo "== gradlew =="; ls -la ./gradlew; file ./gradlew
          echo "== android sdk root =="; ls -la "$ANDROID_HOME" 2>/dev/null || echo "no ANDROID_HOME"
          ls -la "$ANDROID_HOME/cmdline-tools/latest/bin" 2>/dev/null || echo "no cmdline-tools bin"
          ls -la "$ANDROID_HOME/build-tools/34.0.0" 2>/dev/null || echo "no build-tools"
